<!doctype html>
<html lang="ja" data-brand="Instant Design" data-tagline="手軽に起業できる世界のために。">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Instant Design</title>
  <meta name="description" content="Instant Designへのお問い合わせ・先行登録はこちらから。">
  <link rel="stylesheet" href="assets/css/main.css?v=20260508-2">
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a href="index.html" class="brand" aria-label="Instant Design"></a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>

  <section class="page-head">
    <div class="container">
      <div class="page-head__eyebrow reveal">Contact</div>
      <h1 class="page-head__title reveal">お問い合わせ・<br>先行登録</h1>
    </div>
  </section>

  <section>
    <div class="container container--narrow">
      <p class="prose reveal" style="text-align:center; color:var(--color-muted); margin-bottom:var(--sp-7);">
        サービスに関するご質問、リリース時のご連絡をご希望の方は、<br>
        以下のフォームよりお気軽にお送りください。
      </p>

      <!--
        Phase 1: FormSubmit を利用した静的フォーム送信。
        初回送信時に sugiyama_y@ei-and.co.jp 宛に確認メールが届くので、
        そのリンクを1回クリックすれば以後 自動転送されます。
        Phase 2 でバックエンドを実装する際は action を切り替えてください。
      -->
      <form class="form reveal"
            action="https://formsubmit.co/sugiyama_y@ei-and.co.jp"
            method="POST">
        <input type="hidden" name="_subject" value="【Instant Design】お問い合わせ">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="thanks.html">

        <div class="field">
          <label for="name">お名前</label>
          <input id="name" name="お名前" type="text" required autocomplete="name">
        </div>

        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" name="メールアドレス" type="email" required autocomplete="email">
        </div>

        <div class="field">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="内容" required></textarea>
        </div>

        <button type="submit" class="btn btn--primary form__submit">送信する</button>
        <p class="form__note">送信後、内容を確認のうえご連絡いたします。</p>
      </form>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <div class="site-footer__top">
      <div>
        <div class="site-footer__brand"></div>
        <div class="site-footer__tag">手軽に起業できる世界のために。</div>
      </div>
      <nav class="site-footer__nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
    <div class="site-footer__pricing-title">Pricing Preview</div>
    <div class="pricing">
      <div class="price"><div class="price__name">キャッチコピー</div><div class="price__amount">¥2,000</div></div>
      <div class="price"><div class="price__name">チラシ</div><div class="price__amount">¥3,000</div></div>
      <div class="price"><div class="price__name">ロゴ</div><div class="price__amount">¥5,000</div></div>
    </div>
    <div class="site-footer__copy">© 2026 Instant Design. All rights reserved.</div>
  </div>
</footer>

<script src="assets/js/main.js?v=20260508-2"></script>
</body>
</html>
